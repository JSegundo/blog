<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Ambient glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial gradient background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </radialGradient>
    <!-- Amber gradient for pulse line -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5471b0" stop-opacity="0.1"/>
      <stop offset="15%" stop-color="#5471b0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#5471b0" stop-opacity="1"/>
      <stop offset="85%" stop-color="#5471b0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5471b0" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots - background texture -->
  <g fill="#78716c" opacity="0.08">
    <circle cx="80" cy="60" r="1.2"/><circle cx="160" cy="60" r="1.2"/><circle cx="240" cy="60" r="1.2"/>
    <circle cx="320" cy="60" r="1.2"/><circle cx="400" cy="60" r="1.2"/><circle cx="480" cy="60" r="1.2"/>
    <circle cx="560" cy="60" r="1.2"/><circle cx="640" cy="60" r="1.2"/><circle cx="720" cy="60" r="1.2"/>
    <circle cx="80" cy="130" r="1.2"/><circle cx="160" cy="130" r="1.2"/><circle cx="240" cy="130" r="1.2"/>
    <circle cx="320" cy="130" r="1.2"/><circle cx="400" cy="130" r="1.2"/><circle cx="480" cy="130" r="1.2"/>
    <circle cx="560" cy="130" r="1.2"/><circle cx="640" cy="130" r="1.2"/><circle cx="720" cy="130" r="1.2"/>
    <circle cx="80" cy="200" r="1.2"/><circle cx="160" cy="200" r="1.2"/><circle cx="240" cy="200" r="1.2"/>
    <circle cx="320" cy="200" r="1.2"/><circle cx="400" cy="200" r="1.2"/><circle cx="480" cy="200" r="1.2"/>
    <circle cx="560" cy="200" r="1.2"/><circle cx="640" cy="200" r="1.2"/><circle cx="720" cy="200" r="1.2"/>
    <circle cx="80" cy="270" r="1.2"/><circle cx="160" cy="270" r="1.2"/><circle cx="240" cy="270" r="1.2"/>
    <circle cx="320" cy="270" r="1.2"/><circle cx="400" cy="270" r="1.2"/><circle cx="480" cy="270" r="1.2"/>
    <circle cx="560" cy="270" r="1.2"/><circle cx="640" cy="270" r="1.2"/><circle cx="720" cy="270" r="1.2"/>
    <circle cx="80" cy="340" r="1.2"/><circle cx="160" cy="340" r="1.2"/><circle cx="240" cy="340" r="1.2"/>
    <circle cx="320" cy="340" r="1.2"/><circle cx="400" cy="340" r="1.2"/><circle cx="480" cy="340" r="1.2"/>
    <circle cx="560" cy="340" r="1.2"/><circle cx="640" cy="340" r="1.2"/><circle cx="720" cy="340" r="1.2"/>
    <circle cx="80" cy="410" r="1.2"/><circle cx="160" cy="410" r="1.2"/><circle cx="240" cy="410" r="1.2"/>
    <circle cx="320" cy="410" r="1.2"/><circle cx="400" cy="410" r="1.2"/><circle cx="480" cy="410" r="1.2"/>
    <circle cx="560" cy="410" r="1.2"/><circle cx="640" cy="410" r="1.2"/><circle cx="720" cy="410" r="1.2"/>
  </g>

  <!-- Secondary network connections - muted stone gray -->
  <g stroke="#78716c" stroke-width="0.5" opacity="0.15" fill="none">
    <line x1="120" y1="100" x2="250" y2="160"/>
    <line x1="250" y1="160" x2="200" y2="300"/>
    <line x1="200" y1="300" x2="350" y2="340"/>
    <line x1="550" y1="120" x2="680" y2="180"/>
    <line x1="680" y1="180" x2="720" y2="310"/>
    <line x1="600" y1="350" x2="720" y2="310"/>
    <line x1="350" y1="100" x2="450" y2="140"/>
    <line x1="450" y1="320" x2="600" y2="350"/>
    <line x1="120" y1="100" x2="180" y2="50"/>
    <line x1="680" y1="180" x2="750" y2="130"/>
    <line x1="200" y1="300" x2="100" y2="360"/>
  </g>

  <!-- Secondary network nodes - stone gray -->
  <g fill="#78716c" opacity="0.12">
    <circle cx="120" cy="100" r="2.5"/>
    <circle cx="250" cy="160" r="2"/>
    <circle cx="200" cy="300" r="2.5"/>
    <circle cx="350" cy="340" r="2"/>
    <circle cx="550" cy="120" r="2"/>
    <circle cx="680" cy="180" r="2.5"/>
    <circle cx="720" cy="310" r="2"/>
    <circle cx="600" cy="350" r="2.5"/>
    <circle cx="350" cy="100" r="2"/>
    <circle cx="450" cy="140" r="2"/>
    <circle cx="450" cy="320" r="2"/>
    <circle cx="180" cy="50" r="1.5"/>
    <circle cx="750" cy="130" r="1.5"/>
    <circle cx="100" cy="360" r="1.5"/>
  </g>

  <!-- Primary amber network connections to pulse points -->
  <g stroke="#5471b0" stroke-width="0.6" opacity="0.12" fill="none">
    <line x1="250" y1="160" x2="310" y2="225"/>
    <line x1="350" y1="100" x2="380" y2="195"/>
    <line x1="450" y1="140" x2="440" y2="210"/>
    <line x1="550" y1="120" x2="530" y2="215"/>
    <line x1="350" y1="340" x2="370" y2="260"/>
    <line x1="450" y1="320" x2="440" y2="250"/>
    <line x1="600" y1="350" x2="570" y2="250"/>
    <line x1="200" y1="300" x2="240" y2="245"/>
  </g>

  <!-- Heartbeat/pulse line - main feature -->
  <g filter="url(#softGlow)">
    <polyline
      points="60,225 140,225 180,225 220,220 260,230 290,225 310,225 330,190 350,260 370,150 390,280 410,195 430,220 460,225 500,225 530,215 550,230 570,225 590,225 610,220 630,230 650,225 680,225 740,225"
      fill="none"
      stroke="url(#pulseGrad)"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Bright active nodes on pulse line -->
  <g filter="url(#glow)">
    <circle cx="370" cy="150" r="3.5" fill="#5471b0" opacity="0.9"/>
    <circle cx="390" cy="280" r="3" fill="#5471b0" opacity="0.7"/>
    <circle cx="330" cy="190" r="2.5" fill="#5471b0" opacity="0.6"/>
    <circle cx="410" cy="195" r="2.5" fill="#5471b0" opacity="0.6"/>
    <circle cx="350" cy="260" r="2" fill="#5471b0" opacity="0.5"/>
  </g>

  <!-- Smaller accent nodes along pulse -->
  <g fill="#5471b0">
    <circle cx="220" cy="220" r="1.5" opacity="0.4"/>
    <circle cx="260" cy="230" r="1.5" opacity="0.4"/>
    <circle cx="530" cy="215" r="1.5" opacity="0.35"/>
    <circle cx="550" cy="230" r="1.5" opacity="0.35"/>
    <circle cx="610" cy="220" r="1.5" opacity="0.3"/>
    <circle cx="630" cy="230" r="1.5" opacity="0.3"/>
  </g>

  <!-- Large ambient glow behind the peak -->
  <circle cx="390" cy="220" r="80" fill="#5471b0" opacity="0.03" filter="url(#bigGlow)"/>

  <!-- Subtle cross/plus markers at key data points -->
  <g stroke="#5471b0" stroke-width="1" opacity="0.25">
    <line x1="370" y1="143" x2="370" y2="157"/>
    <line x1="363" y1="150" x2="377" y2="150"/>
    <line x1="390" y1="273" x2="390" y2="287"/>
    <line x1="383" y1="280" x2="397" y2="280"/>
  </g>
</svg>